# ============================================
# GitHub Pages 部署工作流
# 将 Next.js 静态导出部署到 GitHub Pages
# ============================================
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 支持手动触发
  workflow_dispatch:

# 确保只有一个部署进程在运行
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Migrate & encrypt Gist data
        run: node scripts/migrate-gist.js
        env:
          GIST_ID: ${{ secrets.NEXT_PUBLIC_GIST_ID }}
          GIST_TOKEN: ${{ secrets.NEXT_PUBLIC_GIST_TOKEN }}
          GIST_MASTER_SECRET: ${{ secrets.GIST_MASTER_SECRET }}

      - name: Scan markdown files for new icons
        run: node scripts/scan-icons.js

      - name: Compute encryption key hash
        id: compute-key
        run: |
          HASH=$(echo -n "${{ secrets.GIST_MASTER_SECRET }}" | sha256sum | cut -d' ' -f1)
          echo "key-hash=$HASH" >> $GITHUB_OUTPUT

      - name: Build static export
        run: npm run export
        env:
          NEXT_PUBLIC_BASE_PATH: /shsg8c1wiki
          NEXT_PUBLIC_GIST_ID: ${{ secrets.NEXT_PUBLIC_GIST_ID }}
          NEXT_PUBLIC_GIST_TOKEN: ${{ secrets.NEXT_PUBLIC_GIST_TOKEN }}
          NEXT_PUBLIC_GIST_KEY: ${{ steps.compute-key.outputs.key-hash }}
          NEXT_PUBLIC_ADMIN_HASH: ${{ secrets.NEXT_PUBLIC_ADMIN_HASH }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
