<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上中初二 Wiki</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Markdown 解析器 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- KaTeX 渲染 LaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <!-- highlight.js 代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- 不再需要单独的语言脚本，highlight.min.js 已包含常见语言 -->
</head>

<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>上中初二 Wiki</h1>
            <button class="toggle-btn" id="toggleBtn">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>
        <ul class="sidebar-tree"></ul>
        <!-- 在侧边栏末尾添加 -->
        <div class="sidebar-announcement" id="announcement">
            <div class="announcement-header">
                <i class="fas fa-bullhorn"></i>
                <span>公告</span>
                <button class="announcement-refresh" id="refreshAnnouncement" title="刷新">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
            <div class="announcement-content" id="announcementContent">
                <p>加载中...</p>
            </div>
        </div>
    </div>
    <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
    <!-- 在 <body> 内部，侧边栏之后 -->
    <div class="wiki-wrapper">
        <div class="main-content">
            <div class="content-header">
                <h2>加载中...</h2>
            </div>
            <div class="wiki-content">
                <p>正在加载...</p>
            </div>
        </div>
        <div class="right-toc" id="rightToc">
            <div class="toc-title">目录</div>
            <ul class="toc-list" id="tocList"></ul>
        </div>
    </div>
    <!-- 底部固定栏 -->
    <div class="bottom-bar">
        <div class="bottom-bar-content">
            <div class="bottom-bar-text">
                <span>© 上中初二 Wiki</span>
                <span class="separator">|</span>
                <span>班级内部交流平台，内容由同学们共同维护</span>
                <span class="separator">|</span>
                <span>如有问题或建议，请联系20272063</span>
            </div>
            <div class="bottom-bar-links">
                <a href="#" id="showDisclaimerBottom">📜 使用条例</a>
                <span class="separator">|</span>
                <a href="#" id="showPrivacyBottom">🔒 隐私说明</a>
                <span class="separator">|</span>
                <a href="#" id="showContactBottom">📧 联系我们</a>
            </div>
        </div>
    </div>
    <script src="js/script_sidebar.js"></script>
    <script src="js/wiki-core.js"></script>
</body>
</html>
