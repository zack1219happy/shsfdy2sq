<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>图标预览</title></head>
<body style="font-family: sans-serif; padding: 40px; font-size: 16px;">

<h2>复制按钮图标</h2>

<p>
  <span style="display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: #f0f0f0; border-radius: 6px;">
    复制按钮默认状态
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="9" y="9" width="13" height="13" rx="2"/>
      <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
    </svg>
    复制
  </span>
</p>

<p>
  <span style="display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: #f0f0f0; border-radius: 6px; color: #28a745;">
    复制成功
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    已复制
  </span>
</p>

<p>
  <span style="display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: #f0f0f0; border-radius: 6px; color: #dc3545;">
    复制失败
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
    失败
  </span>
</p>

</body>
</html>
